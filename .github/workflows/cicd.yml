name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:

env:
  # Updated to Node 24 as per your environment preference
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Python Linting ---
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Install Flake8
        run: pip install flake8

      - name: Lint Python
        run: flake8 api worker

      # --- JS Linting ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.20.2"
          cache: 'npm'
          # CRITICAL FIX: Tell GitHub where to find the lockfile to resolve the cache path
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        # 'npm ci' is faster and more reliable for CI environments than 'npm install'
        run: npm ci

      - name: Lint JavaScript
        run: npm run lint