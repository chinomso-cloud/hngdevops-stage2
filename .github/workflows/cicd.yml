name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:

env:
  NODE_OPTIONS: "--no-deprecation"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Python Setup ---
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Install Flake8
        run: pip install flake8

      - name: Lint Python
        run: flake8 .

      # --- Node.js Setup ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          # Points specifically to the lockfile in your frontend folder
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install JS Dependencies
        # --prefix tells npm to look inside the frontend folder
        run: npm ci --prefix frontend

      - name: Lint JavaScript
        # Runs the lint script defined inside frontend/package.json
        run: npm run lint --prefix frontend --if-present