name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:

env:
  # Added to silence the Node.js 20 deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python lint with flexible path
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          # Looks for requirements.txt anywhere in the repo
          cache-dependency-path: '**/requirements.txt'

      - run: pip install flake8
      - name: Lint Python
        run: flake8 api worker

      # JS lint with flexible path discovery
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Stay on 20 but run on Node24 runner via ENV
          cache: 'npm'
          # Use a glob pattern to find the lock file in subdirectories
          cache-dependency-path: '**/package-lock.json'

      - name: Install ESLint
        run: npm install -g eslint

      - name: Lint JS
        run: eslint frontend || true

      # Docker lint (Recursive)
      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true

  # ... (Rest of jobs: test, build, security, integration) ...