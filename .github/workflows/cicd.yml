name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Python lint
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install flake8

      - name: Lint Python
        run: flake8 api worker

      # JS lint
      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: npm install -g eslint

      - name: Lint JS
        run: eslint frontend || true

      # Docker lint (FIXED)
      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile


  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: |
          pip install pytest pytest-cov fastapi redis httpx

      - name: Run tests
        run: pytest api --cov=api --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build API
        run: docker build -t api:${{ github.sha }} ./api

      - name: Build Worker
        run: docker build -t worker:${{ github.sha }} ./worker

      - name: Build Frontend
        run: docker build -t frontend:${{ github.sha }} ./frontend


  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif


  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 25

      - name: Submit job
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r .job_id)
          echo "Job: $JOB_ID"

      - name: Poll job status
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r .status)
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then exit 0; fi
            sleep 3
          done
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down


  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Simulated Rolling Deploy
        run: |
          echo "Starting deployment..."

          echo "Starting new container..."
          sleep 10

          echo "Health check passed"
          echo "Stopping old container..."

          echo "Deployment successful"