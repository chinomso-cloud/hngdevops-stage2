name: Stage 2 CI/CD Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:

permissions:
  contents: read
  security-events: write

env:
  REGISTRY: 127.0.0.1:5000
  TAG: ${{ github.sha }}
  # Silence Node.js internal deprecation warnings
  NODE_OPTIONS: "--no-deprecation"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint Codebase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 Linter
        run: flake8 api --exclude venv,__pycache__

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          # Points to the lockfile you just created in the frontend folder
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps

      - name: Run ESLint
        run: |
          cd frontend
          npx eslint . || true

      - name: Install Hadolint
        run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - name: Run Hadolint
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: 'api/requirements.txt'

      - name: Install API Dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Pytest with Coverage
        run: |
          cd api
          python -m pytest -v --cov=. --cov-report=xml

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: api/coverage.xml

  build_and_scan:
    name: Build, Push and Security Scan
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Wait for Local Registry
        run: |
          for i in {1..30}; do
            if curl -s http://127.0.0.1:5000/v2/ > /dev/null; then
              echo "Registry ready"
              exit 0
            fi
            echo "Waiting for registry ($i)..."
            sleep 2
          done
          exit 1

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: network=host

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.REGISTRY }}/api:${{ env.TAG }}
            ${{ env.REGISTRY }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Worker Image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/worker:${{ env.TAG }}
            ${{ env.REGISTRY }}/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/frontend:${{ env.TAG }}
            ${{ env.REGISTRY }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/api:${{ env.TAG }}'
          format: 'sarif'
          output: 'api.sarif'
          severity: 'CRITICAL'

      - name: Upload SARIF Report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: api.sarif

  integration:
    name: Integration Testing
    runs-on: ubuntu-latest
    needs: build_and_scan
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          echo "REDIS_URL=redis://redis:6379" >> .env
          echo "API_URL=http://api:8000" >> .env
          echo "REGISTRY=127.0.0.1:5000" >> .env
          echo "TAG=latest" >> .env

      - name: Start Application Stack
        run: docker compose up -d --build

      - name: Wait for API Startup
        run: sleep 25

      - name: Run Integration Script
        run: |
          if [ -f "integration_test.sh" ]; then
            timeout 60 bash integration_test.sh
          else
            echo "integration_test.sh missing!" && exit 1
          fi

      - name: Shutdown Stack
        if: always()
        run: docker compose down

  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Deployment Environment
        run: |
          echo "REDIS_URL=redis://redis:6379" >> .env
          echo "API_URL=http://api:8000" >> .env
          echo "REGISTRY=127.0.0.1:5000" >> .env
          echo "TAG=latest" >> .env

      - name: Perform Rolling Update
        run: |
          docker compose build
          docker compose up -d redis
          sleep 5
          docker compose up -d api worker frontend

      - name: Verify Deployment Health
        run: |
          echo "Waiting for API to respond..."
          for i in {1..15}; do
            if curl -s -f http://localhost:8000/health; then
              echo "Deployment is Healthy!"
              exit 0
            fi
            echo "Attempt $i: API not ready yet..."
            docker ps
            docker logs $(docker ps -q --filter name=api) --tail 10 || true
            sleep 5
          done
          echo "Deployment failed healthcheck"
          exit 1