version: "3.9"

services:

  redis:
    image: redis:7
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M

  api:
    build: ./api
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  worker:
    build: ./worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  frontend:
    build: ./frontend
    environment:
      - API_URL=http://api:8000
      - PORT=3000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    ports:
      - "3001:3000"
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M

networks:
  internal:
    driver: bridge