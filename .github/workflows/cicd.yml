
on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python lint tools
        run: |
          pip install flake8

      - name: Python Lint (API + Worker)
        run: |
          flake8 api worker || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install ESLint
        run: |
          npm install eslint -g

      - name: JS Lint (Frontend)
        run: |
          eslint frontend || true

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "**/Dockerfile"


  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov fastapi redis httpx

      - name: Run API tests
        run: |
          pytest api --cov=api --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


  build:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t api:${{ github.sha }} ./api

      - name: Build Worker image
        run: docker build -t worker:${{ github.sha }} ./worker

      - name: Build Frontend image
        run: docker build -t frontend:${{ github.sha }} ./frontend


  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif


  integration:
    runs-on: ubuntu-latest
    needs: build

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install docker-compose -y

      - name: Start stack
        run: |
          docker compose up -d --build

      - name: Wait for services
        run: sleep 20

      - name: Submit job test
        run: |
          curl -X POST http://localhost:8000/jobs

      - name: Tear down
        if: always()
        run: |
          docker compose down


  deploy:
    runs-on: ubuntu-latest
    needs: [test, security, integration]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy (simulated rolling update)
        run: |
          echo "Deploying new version..."
          docker pull api:${{ github.sha }}
          docker pull worker:${{ github.sha }}
          docker pull frontend:${{ github.sha }}

          echo "Health check simulation..."
          sleep 10
          echo "Deployment successful"