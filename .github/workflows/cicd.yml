name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python lint with Flexible Cache Path
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt' # Finds requirements.txt in any folder
      - run: pip install flake8
      - name: Lint Python
        run: flake8 api worker

      # JS lint with Flexible Cache Path
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json' # Finds package-lock.json in any folder
      
      - name: Install ESLint
        run: npm install -g eslint

      - name: Lint JS
        run: eslint frontend || true

      # Docker lint (Recursive)
      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true